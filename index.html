<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<title>考场座位导航系统</title>

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
    text-align:center;
}

.box{
    width:1600px;
    margin:auto;
    margin-top:20px;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{ margin-bottom:30px; }

input,select{
    width:240px;
    height:40px;
    font-size:16px;
    margin:10px;
    padding-left:10px;
}

button{
    width:130px;
    height:42px;
    font-size:16px;
    cursor:pointer;
}

#result{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}

.classroom{
    margin-top:50px;
    position:relative;
    padding:90px 140px;
}

#mapContainer{
    display:flex;
    justify-content:center;
    align-items:flex-start;
}

.section{
    display:grid;
    gap:8px;
    padding:15px;
    border-radius:12px;
}

.section-1{ background:#e3f2fd; }
.section-2{ background:#e8f5e9; }
.section-3{ background:#fff3e0; }

.grid-cell{
    width:52px;
    height:52px;
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
}

.seat{
    background:#e5e5e5;
    cursor:pointer;
}

.active{
    background:#4CAF50 !important;
    color:white;
    font-weight:bold;
}

.empty{ background:transparent; }

.label{
    background:transparent;
    font-weight:bold;
}

.walkway{
    width:80px;
    align-self:stretch;
    display:flex;
    align-items:center;
    justify-content:center;
    writing-mode:vertical-rl;
    letter-spacing:6px;
    background-color:#ececec;
    background-image:
        repeating-linear-gradient(
            to bottom,
            transparent,
            transparent 14px,
            #c8c8c8 14px,
            #c8c8c8 28px
        ),
        repeating-linear-gradient(
            to bottom,
            #f5f5f5,
            #f5f5f5 4px,
            #e8e8e8 4px,
            #e8e8e8 8px
        );
    border-radius:10px;
    box-shadow:inset 0 0 10px rgba(0,0,0,0.08);
    font-weight:bold;
    color:#888;
    font-size:16px;
}

.door{
    position:absolute;
    color:white;
    padding:15px 20px;
    border-radius:10px;
    font-size:20px;
    z-index:10;
}

.front-door{ background:#2196F3; }
.back-door { background:#FF9800; }

.door-206-front{ top:30px;    left:20px;  }
.door-206-back { bottom:20px; left:20px; }

.door-203-front{ top:30px;    left:20px;  }
.door-203-back { bottom:20px; left:20px;  }

.door-207-front{ top:30px;    right:20px; }
.door-207-back { bottom:20px; right:20px; }

.tip{
    margin-top:20px;
    padding:12px 20px;
    background:#e3f2fd;
    border-radius:8px;
    font-size:14px;
    color:#555;
    display:inline-block;
}

</style>
</head>

<body>

<div class="box">

<h1>考场座位导航系统</h1>

<select id="classroomSelect">
    <option value="">请选择教室</option>
    <option value="综C203">综C203</option>
    <option value="综C206">综C206</option>
    <option value="综C207">综C207</option>
</select>

<br>

<input type="text" id="seatInput" placeholder="请输入座位号">

<button onclick="findSeat()">查询座位</button>

<div id="result"></div>

<div class="classroom" id="classroomContainer">
    <div id="mapContainer"></div>
</div>

<div class="tip">
    ℹ️ 提示：&nbsp;&nbsp;
    1. 输入座位号后点击"查询座位"可定位座位&nbsp;&nbsp;&nbsp;&nbsp;
    2. 点击座位可直接查询该座位
</div>

</div>

document.getElementById("classroomSelect")
    .addEventListener("change", loadClassroom);

function loadClassroom(){

    const classroom = document.getElementById("classroomSelect").value;
    const mapContainer = document.getElementById("mapContainer");
    const container = document.getElementById("classroomContainer");

    mapContainer.innerHTML = "";
    container.querySelectorAll(".door").forEach(d => d.remove());

    if(!(classroom in classrooms)) return;

    const data   = classrooms[classroom];
    const layout = data.layout;

    const front = document.createElement("div");
    front.classList.add("door","front-door", data.frontDoorClass);
    front.innerText = "前门";
    container.appendChild(front);

    const back = document.createElement("div");
    back.classList.add("door","back-door", data.backDoorClass);
    back.innerText = "后门";
    container.appendChild(back);

    layout.forEach((section, index)=>{

        const sectionDiv = document.createElement("div");
        sectionDiv.classList.add("section","section-" + (index+1));

        const cols = section[0].length;
        sectionDiv.style.gridTemplateColumns = `repeat(${cols},52px)`;

        for(let c = 0; c < cols; c++){
            const label = document.createElement("div");
            label.classList.add("grid-cell","label");
            if(classroom=="综C207"){
                label.innerText=cols - c;
            }else{
            label.innerText = c + 1;
            }
            sectionDiv.appendChild(label);
        }

        section.forEach((row, rowIndex)=>{
            row.forEach((seat, colIndex)=>{

                const cell = document.createElement("div");
                cell.classList.add("grid-cell");

                if(seat === null){
                    cell.classList.add("empty");
                }else{
                    cell.classList.add("seat");
                    cell.id = "seat-" + seat;
                    cell.innerText = seat;
                    cell.dataset.row = rowIndex + 1;
                    if(classroom=="综C207"){
                        cell.dataset.col=cols - colIndex;
                    }else{
                    cell.dataset.col = colIndex + 1;}
                    cell.onclick = () => highlightSeat(seat);
                }

                sectionDiv.appendChild(cell);
            });
        });

        mapContainer.appendChild(sectionDiv);

        if(index !== layout.length - 1){
            const walkway = document.createElement("div");
            walkway.classList.add("walkway");
            walkway.innerText = "走道";
            mapContainer.appendChild(walkway);
        }
    });

    document.getElementById("result").innerHTML =
        `<span style="color:#2196F3">${classroom}</span> 加载成功`;
}

function highlightSeat(seatNumber){

    document.querySelectorAll(".seat")
        .forEach(s => s.classList.remove("active"));

    const target = document.getElementById("seat-" + seatNumber);

    if(!target){
        document.getElementById("result").innerHTML = "未找到该座位";
        return;
    }

    target.classList.add("active");
    target.scrollIntoView({ behavior:"smooth", block:"center" });

    document.getElementById("result").innerHTML =
        "已定位：座位号 <b>" + seatNumber + "</b>" +
        "（第 " + target.dataset.row + " 行，第 " + target.dataset.col + " 列）";
}

function findSeat(){

    const seatNumber = parseInt(
        document.getElementById("seatInput").value
    );

    if(isNaN(seatNumber)){
        document.getElementById("result").innerHTML = "请输入正确座位号";
        return;
    }

    highlightSeat(seatNumber);
}

</script>

</body>
</html>
